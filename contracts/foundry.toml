[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = ["@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"]
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
avalanche_fuji = "https://api.avax-test.network/ext/bc/C/rpc"
sepolia = "https://ethereum-sepolia-rpc.publicnode.com"

[etherscan]
avalanche_fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api-testnet.snowtrace.io/api", chain = 43113 }
sepolia = { key = "verifynotrequired", url = "https://api-sepolia.etherscan.io/api", chain = 11155111 }
